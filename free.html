<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sintetizador Solfeggio | Infiniti IA</title>
    <meta name="description" content="Sintetizador gratuito de frecuencias curativas. Toca en vivo y sana con el poder de la acústica cuántica.">
    
    <!-- Librerías -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- React Core -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Orbitron', 'sans-serif'],
                        mono: ['Space Mono', 'monospace'],
                    },
                    colors: {
                        synth: {
                            dark: '#030108',
                            panel: '#0d0514',
                            cyan: '#00f0ff',
                            purple: '#b026ff',
                            gold: '#fbbf24',
                            active: '#ff2a85'
                        }
                    },
                    animation: {
                        'pulse-glow': 'pulseGlow 4s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        pulseGlow: {
                            '0%': { opacity: 0.3, transform: 'scale(1)' },
                            '100%': { opacity: 0.6, transform: 'scale(1.05)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #030108; color: #e2e8f0; overflow-x: hidden; user-select: none; }
        
        .glass-panel {
            background: rgba(13, 5, 20, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(176, 38, 255, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .pad-key {
            transition: all 0.1s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5), inset 0 2px 4px rgba(255,255,255,0.1);
        }
        
        .pad-key.active {
            transform: scale(0.95) translateY(4px);
            box-shadow: 0 0 30px currentColor, inset 0 0 15px currentColor;
            border-color: currentColor;
            background-color: rgba(255,255,255,0.1);
        }

        .mystic-bg {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background: radial-gradient(circle at 50% 50%, rgba(176, 38, 255, 0.1) 0%, transparent 60%),
                        url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23b026ff' fill-opacity='0.05' fill-rule='evenodd'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E");
        }

        /* Visualizador CSS */
        .wave-container { display: flex; align-items: center; justify-content: center; gap: 4px; height: 100px; }
        .wave-bar { width: 8px; background-color: #b026ff; border-radius: 4px; height: 10px; transition: height 0.1s ease, box-shadow 0.1s ease; }
        .wave-bar.playing { animation: soundWave 0.5s ease infinite alternate; box-shadow: 0 0 15px #b026ff; }
        .wave-bar.playing:nth-child(2n) { animation-delay: 0.1s; background-color: #00f0ff; box-shadow: 0 0 15px #00f0ff; }
        .wave-bar.playing:nth-child(3n) { animation-delay: 0.2s; background-color: #fbbf24; box-shadow: 0 0 15px #fbbf24; }

        @keyframes soundWave { 0% { height: 10px; } 100% { height: 80px; } }
    </style>
</head>
<body class="antialiased">

    <div class="mystic-bg animate-pulse-glow"></div>
    <div id="root" class="relative z-10 w-full min-h-screen flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ==========================================
        // MOTOR DE AUDIO (WEB AUDIO API)
        // ==========================================
        let audioCtx = null;
        let masterGain = null;
        let delayNode = null;
        let feedbackGain = null;
        const activeOscillators = {};

        const initAudioEngine = () => {
            if (audioCtx) return;
            
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.5; // Volumen general
            
            // Efecto de Éter (Delay largo para simular ambiente de iglesia/catedral)
            delayNode = audioCtx.createDelay(2.0);
            delayNode.delayTime.value = 0.6; // Segundos de eco
            
            feedbackGain = audioCtx.createGain();
            feedbackGain.gain.value = 0.4; // Cantidad de eco
            
            delayNode.connect(feedbackGain);
            feedbackGain.connect(delayNode);
            
            delayNode.connect(masterGain);
            masterGain.connect(audioCtx.destination);
        };

        const playFrequency = (freq) => {
            if (!audioCtx) initAudioEngine();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (activeOscillators[freq]) return; // Evitar duplicados

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'sine'; // Onda pura curativa
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

            // Envelope Attack (Suave inicio seguro)
            gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.3);

            osc.connect(gain);
            gain.connect(masterGain);
            gain.connect(delayNode); // Mandar al efecto
            
            osc.start();
            activeOscillators[freq] = { osc, gain };
        };

        const stopFrequency = (freq) => {
            if (!activeOscillators[freq]) return;
            const { osc, gain } = activeOscillators[freq];
            
            // Envelope Release (Desvanecimiento largo)
            gain.gain.setValueAtTime(gain.gain.value, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3.0); // 3 segundos de fade out
            
            osc.stop(audioCtx.currentTime + 3.0);
            delete activeOscillators[freq];
        };

        // ==========================================
        // BASE DE DATOS DE FRECUENCIAS SOLFEGGIO
        // ==========================================
        const FREQUENCIES = [
            { freq: 396, note: 'Raíz', objective: 'Liberación de Miedo y Culpa', key: 'a', color: '#ef4444' },
            { freq: 417, note: 'Sacro', objective: 'Cambio y Resolución de Traumas', key: 's', color: '#f97316' },
            { freq: 528, note: 'Plexo Solar', objective: 'Paz, Reparación ADN (Frecuencia Milagro)', key: 'd', color: '#fbbf24' },
            { freq: 639, note: 'Corazón', objective: 'Armonía en Relaciones y Conexión', key: 'f', color: '#10b981' },
            { freq: 741, note: 'Garganta', objective: 'Expresión, Verdad y Limpieza', key: 'g', color: '#0ea5e9' },
            { freq: 852, note: 'Tercer Ojo', objective: 'Despertar Intuitivo y Claridad', key: 'h', color: '#6366f1' },
            { freq: 963, note: 'Corona', objective: 'Conexión Divina (El Código Invictus)', key: 'j', color: '#b026ff' }
        ];

        // ==========================================
        // COMPONENTE PRINCIPAL
        // ==========================================
        const SynthApp = () => {
            const [engineStarted, setEngineStarted] = useState(false);
            const [activeKeys, setActiveKeys] = useState({}); // { freq: boolean }
            
            // Atajos de teclado
            useEffect(() => {
                if (!engineStarted) return;

                const handleKeyDown = (e) => {
                    if (e.repeat) return;
                    const key = e.key.toLowerCase();
                    const pad = FREQUENCIES.find(f => f.key === key);
                    if (pad) {
                        playFrequency(pad.freq);
                        setActiveKeys(prev => ({ ...prev, [pad.freq]: true }));
                    }
                };

                const handleKeyUp = (e) => {
                    const key = e.key.toLowerCase();
                    const pad = FREQUENCIES.find(f => f.key === key);
                    if (pad) {
                        stopFrequency(pad.freq);
                        setActiveKeys(prev => ({ ...prev, [pad.freq]: false }));
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                window.addEventListener('keyup', handleKeyUp);

                return () => {
                    window.removeEventListener('keydown', handleKeyDown);
                    window.removeEventListener('keyup', handleKeyUp);
                };
            }, [engineStarted]);

            // Mouse / Touch handlers
            const handlePadDown = (freq) => {
                if (!engineStarted) return;
                playFrequency(freq);
                setActiveKeys(prev => ({ ...prev, [freq]: true }));
            };

            const handlePadUp = (freq) => {
                if (!engineStarted) return;
                stopFrequency(freq);
                setActiveKeys(prev => ({ ...prev, [freq]: false }));
            };

            const startEngine = () => {
                initAudioEngine();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                setEngineStarted(true);
            };

            const isAnyPlaying = Object.values(activeKeys).some(val => val);

            return (
                <div className="flex flex-col min-h-screen py-10 px-4 md:px-8 max-w-6xl mx-auto w-full">
                    
                    {/* ENCABEZADO */}
                    <header className="text-center mb-10">
                        <div className="inline-flex items-center justify-center w-16 h-16 rounded-full border border-synth-cyan/50 bg-synth-cyan/10 mb-4 shadow-[0_0_20px_rgba(0,240,255,0.3)]">
                            <i className="ph-thin ph-wave-sine text-4xl text-synth-cyan"></i>
                        </div>
                        <h1 className="font-display text-4xl md:text-5xl font-black mb-2 tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-synth-cyan via-synth-purple to-synth-gold">
                            OPUS AETERNA
                        </h1>
                        <p className="font-mono text-xs md:text-sm text-gray-400 uppercase tracking-[0.3em]">
                            Sintetizador Cuántico Solfeggio
                        </p>
                    </header>

                    {!engineStarted ? (
                        <div className="flex-1 flex flex-col items-center justify-center animate-[fadeIn_0.5s_ease-out]">
                            <div className="glass-panel p-10 rounded-3xl text-center max-w-lg border-t-2 border-synth-cyan">
                                <i className="ph-fill ph-headphones text-6xl text-synth-cyan mb-6 animate-bounce"></i>
                                <h2 className="font-display text-2xl font-bold text-white mb-4">INICIAR SANACIÓN</h2>
                                <p className="text-gray-400 mb-8 font-light leading-relaxed">
                                    Este módulo genera ondas acústicas senoidales puras en tiempo real. Usa audífonos para una inmersión total en la frecuencia divina.
                                </p>
                                <button 
                                    onClick={startEngine}
                                    className="px-10 py-4 bg-gradient-to-r from-synth-cyan to-synth-purple text-white font-bold rounded-full uppercase tracking-widest shadow-[0_0_30px_rgba(176,38,255,0.5)] hover:scale-105 transition duration-300"
                                >
                                    Encender Osciladores
                                </button>
                            </div>
                        </div>
                    ) : (
                        <div className="flex-1 flex flex-col animate-[fadeIn_0.8s_ease-out]">
                            
                            {/* VISUALIZADOR */}
                            <div className="glass-panel p-6 rounded-3xl mb-8 flex flex-col items-center justify-center min-h-[150px] border-t border-synth-purple/40">
                                <div className="text-[10px] font-mono text-gray-500 uppercase tracking-[0.2em] mb-4">Espectro de Frecuencia Activo</div>
                                <div className="wave-container">
                                    {Array.from({length: 15}).map((_, i) => (
                                        <div key={i} className={`wave-bar ${isAnyPlaying ? 'playing' : ''}`}></div>
                                    ))}
                                </div>
                            </div>

                            {/* INSTRUCCIONES */}
                            <div className="text-center mb-8 font-mono text-xs text-gray-400">
                                <span className="hidden md:inline">Presiona las teclas (A, S, D, F, G, H, J) de tu teclado para tocar. <br/></span>
                                Puedes tocar múltiples frecuencias al mismo tiempo (Polifonía).
                            </div>

                            {/* TECLADO / PADS */}
                            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4 md:gap-6">
                                {FREQUENCIES.map((pad) => (
                                    <div 
                                        key={pad.freq}
                                        onMouseDown={() => handlePadDown(pad.freq)}
                                        onMouseUp={() => handlePadUp(pad.freq)}
                                        onMouseLeave={() => handlePadUp(pad.freq)}
                                        onTouchStart={(e) => { e.preventDefault(); handlePadDown(pad.freq); }}
                                        onTouchEnd={(e) => { e.preventDefault(); handlePadUp(pad.freq); }}
                                        className={`pad-key flex flex-col items-center justify-between p-4 md:p-6 rounded-2xl border cursor-pointer select-none h-40 md:h-56 ${activeKeys[pad.freq] ? 'active' : 'bg-synth-panel/80 border-gray-700/50 hover:bg-gray-800'}`}
                                        style={{ color: pad.color }}
                                    >
                                        <div className="text-center">
                                            <div className="font-display font-bold text-2xl md:text-3xl mb-1">{pad.freq}</div>
                                            <div className="font-mono text-[9px] uppercase tracking-widest text-white/50">Hz</div>
                                        </div>
                                        
                                        <div className="text-center flex-1 flex flex-col justify-center my-2">
                                            <div className="text-white font-bold text-sm mb-1">{pad.note}</div>
                                            <div className="text-[9px] md:text-[10px] text-gray-400 leading-tight">{pad.objective}</div>
                                        </div>

                                        <div className="hidden md:flex w-8 h-8 rounded border border-current items-center justify-center font-mono font-bold text-white/70">
                                            {pad.key.toUpperCase()}
                                        </div>
                                    </div>
                                ))}
                            </div>

                        </div>
                    )}

                    {/* FOOTER */}
                    <footer className="mt-12 pt-6 text-center text-[10px] font-mono text-gray-600 tracking-[0.2em] uppercase border-t border-white/5">
                        Arquitectura Sonora Libre <br/>
                        Potenciado por Infiniti IA & Invictus Maximus
                    </footer>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SynthApp />);
    </script>
</body>
</html>
