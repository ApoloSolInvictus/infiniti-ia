<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPUS ASTRAL | Experiencia Cuántica 3D</title>
    
    <!-- Librerías -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Three.js para la magia 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Orbitron', 'sans-serif'],
                        mono: ['Space Mono', 'monospace'],
                    },
                    colors: {
                        astral: {
                            dark: '#030108',
                            cyan: '#00f0ff',
                            purple: '#b026ff',
                            gold: '#fbbf24'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            margin: 0; padding: 0; background-color: #030108; color: #fff; 
            overflow: hidden; font-family: 'Space Mono', monospace; 
        }

        #canvas-container {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1;
        }

        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            display: flex; flex-direction: column;
        }
        
        .interactive { pointer-events: auto; }

        .glass-panel {
            background: rgba(3, 1, 8, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.1);
        }

        /* Botón Místico */
        .upload-btn {
            background: linear-gradient(45deg, #00f0ff, #b026ff);
            background-size: 200% 200%;
            animation: gradientShift 3s ease infinite;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .upload-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(176, 38, 255, 0.6);
            letter-spacing: 2px;
        }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        input[type="file"] { display: none; }

        /* HUD Transitions */
        .hud-hidden { opacity: 0; transform: translateY(20px); pointer-events: none; transition: all 0.8s ease; }
        .hud-active { opacity: 1; transform: translateY(0); pointer-events: auto; transition: all 0.8s ease; }
        
        #intro-screen { transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        #intro-screen.hidden-intro { opacity: 0; transform: scale(1.1); pointer-events: none; }
    </style>
</head>
<body>

    <!-- LIENZO 3D WEBGL -->
    <div id="canvas-container"></div>

    <!-- UI LAYER -->
    <div class="ui-layer">
        
        <!-- TOP HUD -->
        <header class="p-6 flex justify-between items-start opacity-70">
            <div>
                <h1 class="font-display font-bold text-2xl tracking-[0.2em] text-astral-cyan drop-shadow-[0_0_10px_#00f0ff]">OPUS ASTRAL</h1>
                <p class="text-[10px] tracking-[0.4em] uppercase mt-1 text-astral-purple">Hyper-Dimensional Engine</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-astral-gold uppercase tracking-widest flex items-center justify-end gap-2">
                    <span class="w-2 h-2 rounded-full bg-astral-gold animate-pulse"></span>
                    RESONANCIA 432Hz
                </p>
                <p id="fps-counter" class="text-xs text-gray-500 mt-1">SISTEMA INICIADO</p>
            </div>
        </header>

        <!-- INTRO UPLOAD SCREEN -->
        <div id="intro-screen" class="absolute inset-0 flex items-center justify-center interactive z-50 bg-astral-dark/80 backdrop-blur-sm">
            <div class="glass-panel p-10 rounded-[2rem] text-center max-w-lg mx-4 border-t-2 border-t-astral-cyan">
                <i class="ph-fill ph-infinity text-6xl text-astral-cyan mb-6 animate-pulse"></i>
                <h2 class="font-display text-3xl font-bold mb-4 text-white">CONEXIÓN ASTRAL</h2>
                <p class="text-sm text-gray-400 mb-8 leading-relaxed font-mono">
                    Sube tu pista de audio. La Inteligencia Cuántica mapeará las frecuencias y distorsionará el espacio-tiempo en 3D.
                </p>
                
                <label class="upload-btn cursor-pointer px-10 py-5 rounded-full font-display font-bold uppercase tracking-widest text-sm inline-flex items-center gap-3 text-white shadow-lg">
                    <i class="ph-bold ph-upload-simple text-xl"></i>
                    AÑADIR FRECUENCIA
                    <input type="file" id="audio-upload" accept="audio/*">
                </label>
            </div>
        </div>

        <!-- PLAYER HUD (BOTTOM) -->
        <div id="player-hud" class="mt-auto p-6 md:p-10 hud-hidden interactive">
            <div class="glass-panel max-w-5xl mx-auto rounded-3xl p-6 flex flex-col md:flex-row items-center justify-between gap-6">
                
                <div class="flex items-center gap-6 w-full md:w-auto">
                    <button id="btn-play" class="w-16 h-16 rounded-full bg-white text-black flex items-center justify-center hover:scale-105 transition shadow-[0_0_20px_rgba(255,255,255,0.4)] shrink-0">
                        <i id="play-icon" class="ph-fill ph-pause text-2xl"></i>
                    </button>
                    <div class="flex flex-col min-w-0">
                        <span class="text-[10px] text-astral-cyan uppercase tracking-widest">Transmitiendo Matriz</span>
                        <h3 id="track-name" class="font-display font-bold text-xl text-white truncate max-w-[250px] md:max-w-[400px]">Desconocido</h3>
                    </div>
                </div>

                <div class="flex-1 w-full max-w-md flex flex-col gap-2">
                    <div class="flex justify-between text-[10px] text-gray-400 font-mono">
                        <span id="time-current">0:00</span>
                        <span id="time-total">0:00</span>
                    </div>
                    <div class="w-full h-1.5 bg-gray-800 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-gradient-to-r from-astral-cyan to-astral-purple w-0 shadow-[0_0_10px_#b026ff]"></div>
                    </div>
                </div>

                <div class="flex items-center gap-4 shrink-0">
                    <div class="text-right hidden md:block">
                        <div class="text-[9px] text-gray-500 tracking-widest uppercase">BASS WARP</div>
                        <div class="w-24 h-1 bg-gray-800 rounded-full mt-1">
                            <div id="bass-meter" class="h-full bg-astral-gold w-0 transition-all duration-75"></div>
                        </div>
                    </div>
                    <label class="w-12 h-12 rounded-full border border-gray-600 flex items-center justify-center hover:bg-gray-800 hover:border-astral-cyan hover:text-astral-cyan transition cursor-pointer" title="Cargar otra pista">
                        <i class="ph-bold ph-arrows-clockwise text-xl"></i>
                        <input type="file" id="audio-upload-2" accept="audio/*">
                    </label>
                </div>
            </div>
        </div>

    </div>

    <!-- LOGICA MAGICA (THREE.JS + WEB AUDIO API) -->
    <script>
        // --- VARIABLES AUDIO ---
        let audioContext, analyser, source, audio;
        let dataArray, bufferLength;
        let isPlaying = false;

        // --- VARIABLES THREE.JS ---
        let scene, camera, renderer;
        let sphereMesh, starGeo, stars;
        let originalVertices = [];
        let timeHue = 0;
        let warpSpeed = 1;

        // --- ELEMENTOS UI ---
        const introScreen = document.getElementById('intro-screen');
        const playerHud = document.getElementById('player-hud');
        const trackNameEl = document.getElementById('track-name');
        const btnPlay = document.getElementById('btn-play');
        const playIcon = document.getElementById('play-icon');
        const timeCurrentEl = document.getElementById('time-current');
        const timeTotalEl = document.getElementById('time-total');
        const progressBar = document.getElementById('progress-bar');
        const bassMeter = document.getElementById('bass-meter');

        // ==========================================
        // 1. INICIALIZACIÓN 3D (THREE.JS)
        // ==========================================
        function init3D() {
            const container = document.getElementById('canvas-container');
            
            // Escena y Cámara
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.z = 60;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // A. LA ESFERA INVICTUS (Malla Deformable)
            const geometry = new THREE.IcosahedronGeometry(20, 6); // Alto detalle
            
            // Guardar vértices originales para calcular la deformación
            const positionAttribute = geometry.attributes.position;
            for (let i = 0; i < positionAttribute.count; i++) {
                originalVertices.push(new THREE.Vector3(
                    positionAttribute.getX(i),
                    positionAttribute.getY(i),
                    positionAttribute.getZ(i)
                ));
            }

            const material = new THREE.MeshPhongMaterial({
                color: 0x00f0ff,
                emissive: 0x0a0022,
                specular: 0xffffff,
                shininess: 100,
                wireframe: true,
                transparent: true,
                opacity: 0.8
            });

            sphereMesh = new THREE.Mesh(geometry, material);
            scene.add(sphereMesh);

            // B. NÚCLEO INTERNO GLOW
            const coreGeometry = new THREE.IcosahedronGeometry(18, 2);
            const coreMaterial = new THREE.MeshBasicMaterial({
                color: 0x050110,
                transparent: true,
                opacity: 0.9
            });
            const coreMesh = new THREE.Mesh(coreGeometry, coreMaterial);
            scene.add(coreMesh);

            // C. CAMPO DE ESTRELLAS (Para efecto Warp Speed)
            starGeo = new THREE.BufferGeometry();
            const starCount = 3000;
            const posArray = new Float32Array(starCount * 3);
            for(let i=0; i < starCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 400; // Esparcir en el espacio
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            
            const starMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.7,
                transparent: true,
                opacity: 0.8
            });
            stars = new THREE.Points(starGeo, starMaterial);
            scene.add(stars);

            // D. ILUMINACIÓN
            const ambientLight = new THREE.AmbientLight(0x222222);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xb026ff, 2, 200);
            pointLight.position.set(0, 0, 0);
            scene.add(pointLight);

            // Responsive
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Iniciar Animación Base
            animate3D();
        }

        // --- BUCLE DE ANIMACIÓN 3D ---
        function animate3D() {
            requestAnimationFrame(animate3D);

            // Rotación constante suave
            sphereMesh.rotation.y += 0.002;
            sphereMesh.rotation.x += 0.001;

            let currentBass = 0;

            if (isPlaying && analyser) {
                analyser.getByteFrequencyData(dataArray);

                // Calcular Bajos (Bins bajos)
                let bassSum = 0;
                for(let i=0; i<15; i++) bassSum += dataArray[i];
                currentBass = bassSum / 15; // 0 - 255
                
                bassMeter.style.width = `${(currentBass / 255) * 100}%`;

                // Calcular Medios (Color)
                let midSum = 0;
                for(let i=20; i<80; i++) midSum += dataArray[i];
                let mid = midSum / 60;

                // Mutación de Color basada en la música
                timeHue += 0.1 + (mid * 0.02);
                if(timeHue > 360) timeHue = 0;
                sphereMesh.material.color.setHSL(timeHue / 360, 1, 0.6);

                // --- DEFORMACIÓN CUÁNTICA DE LA ESFERA ---
                const positions = sphereMesh.geometry.attributes.position;
                
                for (let i = 0; i < positions.count; i++) {
                    const orig = originalVertices[i];
                    // Mapear el índice del vértice a una frecuencia del array de audio
                    // Usamos mod para no salirnos de los límites del array (1024)
                    const audioIndex = i % (bufferLength / 2); 
                    const freqValue = dataArray[audioIndex];
                    
                    // Calcular el factor de explosión (picos más afilados)
                    // Multiplicamos por la agresividad del bajo
                    const scaleFactor = 1 + (freqValue / 255) * 0.6 * (currentBass/200); 

                    // Actualizar vértice
                    positions.setXYZ(i, orig.x * scaleFactor, orig.y * scaleFactor, orig.z * scaleFactor);
                }
                positions.needsUpdate = true; // Fundamental en Three.js

                // --- EFECTO WARP SPEED (ESTRELLAS) ---
                // Si el bajo golpea fuerte (ej. un Drop de Tech House), acelerar estrellas
                if (currentBass > 210) {
                    warpSpeed = 10; // Velocidad de la luz
                } else {
                    warpSpeed += (0.5 - warpSpeed) * 0.1; // Volver suavemente a vel. normal
                }
            } else {
                // Si no hay música, calmar las estrellas
                warpSpeed = 0.5;
            }

            // Animar Campo de Estrellas hacia la cámara
            const starPositions = starGeo.attributes.position.array;
            for(let i=1; i < starCount * 3; i+=3) { // Animamos el eje Z
                starPositions[i+1] += warpSpeed;
                // Si la estrella pasa la cámara, reiniciarla al fondo
                if (starPositions[i+1] > 100) {
                    starPositions[i+1] = -300;
                }
            }
            starGeo.attributes.position.needsUpdate = true;

            // Renderizar la escena
            renderer.render(scene, camera);
        }


        // ==========================================
        // 2. SISTEMA DE AUDIO
        // ==========================================
        function initAudio(file) {
            if(audio) {
                audio.pause();
                URL.revokeObjectURL(audio.src);
            } else {
                audio = new Audio();
                setupAudioNodes();
            }

            audio.src = URL.createObjectURL(file);
            trackNameEl.innerText = file.name.replace(/\.[^/.]+$/, "");
            
            audio.load();
            audio.play();
            isPlaying = true;
            playIcon.className = "ph-fill ph-pause text-2xl";

            audio.addEventListener('timeupdate', updateProgress);
            audio.addEventListener('loadedmetadata', () => {
                timeTotalEl.innerText = formatTime(audio.duration);
            });
            audio.addEventListener('ended', () => {
                isPlaying = false;
                playIcon.className = "ph-fill ph-play text-2xl";
            });

            // Transiciones de UI
            introScreen.classList.add('hidden-intro');
            playerHud.classList.remove('hud-hidden');
            playerHud.classList.add('hud-active');
        }

        function setupAudioNodes() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioContext = new AudioContext();
            analyser = audioContext.createAnalyser();
            
            analyser.fftSize = 2048; // Alta resolución para deformar la esfera
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);

            source = audioContext.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
        }

        // --- CONTROLES Y UTILIDADES ---
        document.getElementById('audio-upload').addEventListener('change', (e) => {
            if(e.target.files[0]) initAudio(e.target.files[0]);
        });
        document.getElementById('audio-upload-2').addEventListener('change', (e) => {
            if(e.target.files[0]) initAudio(e.target.files[0]);
        });

        btnPlay.addEventListener('click', () => {
            if(!audio) return;
            if (audioContext.state === 'suspended') audioContext.resume();

            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                playIcon.className = "ph-fill ph-play text-2xl";
            } else {
                audio.play();
                isPlaying = true;
                playIcon.className = "ph-fill ph-pause text-2xl";
            }
        });

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function updateProgress() {
            if (!audio) return;
            timeCurrentEl.innerText = formatTime(audio.currentTime);
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = `${percent}%`;
        }

        // Iniciar el entorno 3D tan pronto carga la página
        init3D();

    </script>
</body>
</html>
