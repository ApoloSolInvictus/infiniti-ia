                                        </div>

                                        <p className="text-xs md:text-sm text-gray-400 mb-6 leading-relaxed shrink-0">
                                            Carga tus comprobantes de pago de PayPal, facturas o contratos firmados a nuestra base de datos. Poseemos encriptación de extremo a extremo.
                                        </p>

                                        <div className="flex-1 w-full bg-white rounded-2xl overflow-hidden border border-gray-200 relative shadow-inner flex flex-col">
                                             <iframe 
                                                src={GOOGLE_DRIVE_UPLOAD_URL} 
                                                style={{border: 0, width: '100%', height: '100%'}} 
                                                frameBorder="0"
                                                className="absolute inset-0 z-10"
                                            ></iframe>

                                            <div className="absolute inset-0 z-0 flex flex-col items-center justify-center bg-slate-50">
                                                <i className="ph ph-cloud-arrow-up text-nexus-cyan text-4xl mb-3 animate-bounce"></i>
                                                <p className="text-xs font-mono text-slate-500 tracking-widest">Conectando Bóveda...</p>
                                            </div>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        )}

                    </main>

                    {/* FOOTER */}
                    <footer className="border-t border-white/5 bg-nexus-bg/80 backdrop-blur text-center py-6 text-[10px] md:text-xs text-gray-600 font-mono z-20 relative shrink-0">
                        <p className="px-4">© 2026 INFINITI IA BY W STUDIO. ENGINEERED BY APOLLO SOL INVICTUS & QUANTUM MAXIMUS.</p>
                    </footer>
                </div>
            );
        };

        // --- SUBCOMPONENTE: CHATBOT CON VOZ ---
        const AiChatbot = () => {
            const [messages, setMessages] = useState([{ role: 'ai', content: 'Sistemas en línea. Soy Quantum Maximus. Usa el micrófono o el teclado para consultar sobre nuestros servicios internacionales de desarrollo web e IA.' }]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [isListening, setIsListening] = useState(false);
            const bottomRef = useRef(null);

            useEffect(() => {
                bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.getVoices(); 
                }
            }, [messages]);

            const sendMessage = async (text) => {
                const messageToSend = text || input;
                if (!messageToSend.trim()) return;

                if ('speechSynthesis' in window) {
                    const unlock = new SpeechSynthesisUtterance("");
                    unlock.volume = 0;
                    window.speechSynthesis.speak(unlock);
                }

                setMessages(prev => [...prev, { role: 'user', content: messageToSend }]);
                setInput('');
                setLoading(true);

                try {
                    const response = await fetch(`${API_URL_CHAT}/api/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            message: `${SYSTEM_PROMPT}\n\nUSER: ${messageToSend}`, 
                            history: messages.map(m => ({ role: m.role, content: m.content }))
                        })
                    });

                    if (!response.ok) {
                        const err = await response.json().catch(() => ({}));
                        throw new Error(err.detail || "Fallo en la red cuántica");
                    }
                    const data = await response.json();
                    
                    setMessages(prev => [...prev, { role: 'ai', content: data.response }]);
                    readAloud(data.response);

                } catch (error) {
                    setMessages(prev => [...prev, { role: 'ai', content: `⚠️ Error: ${error.message}` }]);
                } finally {
                    setLoading(false);
                }
            };

            const toggleVoice = () => {
                if (!('webkitSpeechRecognition' in window)) {
                    alert("Tu navegador no soporta entrada de voz. Usa Chrome.");
                    return;
                }
                const recognition = new webkitSpeechRecognition();
                recognition.lang = 'es-CR';
                recognition.interimResults = false;

                recognition.onstart = () => setIsListening(true);
                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    sendMessage(transcript); 
                };
                recognition.onerror = (event) => {
                    console.error("Speech error", event.error);
                    setIsListening(false);
                };
                recognition.onend = () => setIsListening(false);
                recognition.start();
            };

            const readAloud = (text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel(); 
                    const cleanText = text.replace(/[*#_`~]/g, '');
                    const utterance = new SpeechSynthesisUtterance(cleanText);
                    utterance.lang = 'es-ES';
                    
                    const voices = window.speechSynthesis.getVoices();
                    const esVoice = voices.find(v => v.lang.startsWith('es') && !v.name.includes('Google español de Estados Unidos'));
                    if (esVoice) utterance.voice = esVoice;

                    utterance.pitch = 0.9;
                    utterance.rate = 1.0;
                    window.speechSynthesis.speak(utterance);
                }
            };

            return (
                <div className="w-full max-w-4xl h-[80vh] md:h-[70vh] mt-4 lg:mt-0 glass-panel rounded-3xl flex flex-col overflow-hidden animate-[fadeIn_0.5s_ease-out] shadow-2xl shadow-nexus-purple/20 border border-nexus-purple/30">
                    <div className="bg-black/40 p-4 border-b border-nexus-purple/20 flex justify-between items-center shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-nexus-purple/20 rounded-full flex items-center justify-center text-nexus-purple border border-nexus-purple shrink-0">
                                <i className="ph-fill ph-cpu text-xl"></i>
                            </div>
                            <div>
                                <h3 className="font-display font-bold text-white tracking-widest text-sm md:text-base">NEXUS ORACLE</h3>
                                <p className="text-[10px] text-nexus-cyan font-mono uppercase">Voz & Texto Activos</p>
                            </div>
                        </div>
                        <button onClick={() => window.speechSynthesis.cancel()} className="text-gray-500 hover:text-red-400 text-[10px] md:text-xs font-mono border border-gray-700 px-2 py-1 rounded transition shrink-0">SILENCIAR VOZ</button>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 bg-black/20">
                        {messages.map((msg, i) => (
                            <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[90%] md:max-w-[85%] p-4 rounded-2xl text-sm leading-relaxed shadow-lg ${
                                    msg.role === 'user' 
                                    ? 'bg-nexus-purple text-white rounded-br-none' 
                                    : 'bg-nexus-panel border border-nexus-cyan/30 text-gray-200 rounded-bl-none'
                                }`}>
                                    <div dangerouslySetInnerHTML={{__html: marked.parse(msg.content)}}></div>
                                </div>
                            </div>
                        ))}
                        {loading && (
                            <div className="flex justify-start">
                                <div className="bg-nexus-panel p-4 rounded-2xl border border-nexus-cyan/30 rounded-bl-none flex gap-2 items-center">
                                    <i className="ph ph-spinner-gap animate-spin text-nexus-cyan text-xl"></i>
                                    <span className="text-xs font-mono text-nexus-cyan">Procesando Consulta...</span>
                                </div>
                            </div>
                        )}
                        <div ref={bottomRef}></div>
                    </div>

                    <div className="p-3 md:p-4 bg-black/60 border-t border-nexus-purple/20 backdrop-blur shrink-0">
                        <div className="relative flex items-center gap-2">
                            <button 
                                onClick={toggleVoice}
                                className={`w-12 h-12 rounded-full flex items-center justify-center text-xl transition-all border shrink-0 ${
                                    isListening 
                                    ? 'bg-nexus-pink/20 text-nexus-pink border-nexus-pink mic-active' 
                                    : 'bg-nexus-panel text-gray-400 border-gray-700 hover:text-nexus-cyan hover:border-nexus-cyan'
                                }`}
                                title="Hablar"
                            >
                                <i className={`ph-fill ${isListening ? 'ph-waveform' : 'ph-microphone'}`}></i>
                            </button>
                            
                            <input 
                                type="text" 
                                value={input}
                                onChange={e => setInput(e.target.value)}
                                onKeyPress={e => e.key === 'Enter' && sendMessage()}
                                placeholder={isListening ? "Escuchando..." : "Escribe tu comando..."}
                                className="flex-1 bg-black border border-gray-700 rounded-full px-4 md:px-5 py-3 text-white text-sm md:text-base focus:outline-none focus:border-nexus-purple focus:shadow-[0_0_15px_rgba(176,38,255,0.3)] transition"
                                disabled={loading || isListening}
                            />
                            
                            <button 
                                onClick={() => sendMessage()}
                                disabled={loading || !input.trim()}
                                className="w-12 h-12 bg-nexus-purple text-white rounded-full flex items-center justify-center hover:bg-purple-500 transition disabled:opacity-50 shrink-0"
                            >
                                <i className="ph-fill ph-paper-plane-right"></i>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- SUBCOMPONENTE: GENERADOR DE IMÁGENES DALL-E 3 ---
        const ImageForge = () => {
            const [prompt, setPrompt] = useState("");
            const [imageUrl, setImageUrl] = useState("");
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");

            const generateImage = async () => {
                if (!prompt.trim()) return;
                setLoading(true);
                setError("");
                setImageUrl("");

                try {
                    const response = await fetch(`${API_URL_IMAGE}/api/image`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: prompt })
                    });

                    if (!response.ok) {
                        const errData = await response.json().catch(() => ({}));
                        throw new Error(errData.detail || `Error del servidor (${response.status})`);
                    }
                    
                    const data = await response.json();
                    if (!data.url) throw new Error("URL vacía recibida del servidor.");
                    setImageUrl(data.url);
                } catch (e) {
                    setError(`Fallo en la forja: ${e.message}`);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="w-full max-w-5xl mt-6 lg:mt-0 glass-panel rounded-3xl p-5 md:p-8 flex flex-col md:flex-row gap-6 md:gap-8 animate-[fadeIn_0.5s_ease-out] shadow-2xl shadow-nexus-pink/20 border border-nexus-pink/30">
                    
                    {/* Panel de Control */}
                    <div className="w-full md:w-1/3 flex flex-col">
                        <div className="flex items-center gap-3 mb-4 md:mb-6 shrink-0">
                            <i className="ph-fill ph-magic-wand text-3xl text-nexus-pink"></i>
                            <div>
                                <h3 className="font-display font-bold text-xl text-white">THE FORGE</h3>
                                <p className="text-[10px] text-gray-400 font-mono uppercase tracking-widest">Motor DALL-E 3</p>
                            </div>
                        </div>
                        
                        <p className="text-xs md:text-sm text-gray-400 mb-6 leading-relaxed shrink-0">
                            Crea imágenes fotorrealistas, arte conceptual o logos al instante. Describe tu visión y nuestra IA la pintará en la realidad.
                        </p>

                        <div className="space-y-4 flex-1 flex flex-col">
                            <textarea 
                                value={prompt}
                                onChange={e => setPrompt(e.target.value)}
                                className="w-full flex-1 min-h-[100px] md:h-32 bg-black/50 border border-gray-700 rounded-xl p-4 text-white text-sm focus:outline-none focus:border-nexus-pink transition resize-none placeholder:text-gray-600"
                                placeholder="Ej: Un coche deportivo futurista negro mate con luces neón..."
                            ></textarea>

                            <button 
                                onClick={generateImage}
                                disabled={loading || !prompt.trim()}
                                className="w-full py-4 bg-nexus-pink hover:bg-pink-600 text-white font-bold rounded-xl shadow-[0_0_20px_rgba(255,42,133,0.4)] transition flex items-center justify-center gap-2 disabled:opacity-50 disabled:shadow-none shrink-0"
                            >
                                {loading ? <i className="ph ph-spinner-gap animate-spin text-xl"></i> : <i className="ph-bold ph-paint-brush text-xl"></i>}
                                {loading ? "Renderizando..." : "Generar Arte"}
                            </button>

                            {error && <div className="p-3 bg-red-900/30 border border-red-500/50 rounded-lg text-xs text-red-400 font-mono shrink-0">{error}</div>}
                        </div>
                    </div>

                    {/* Lienzo Visual */}
                    <div className="w-full md:w-2/3 bg-black/50 rounded-2xl border border-gray-800 flex items-center justify-center relative overflow-hidden min-h-[350px] md:min-h-[400px]">
                        {!imageUrl && !loading && (
                            <div className="text-center text-gray-600 p-6">
                                <i className="ph-thin ph-image text-6xl mb-2 opacity-50"></i>
                                <p className="font-mono text-xs uppercase tracking-widest">Lienzo Vacío</p>
                            </div>
                        )}
                        
                        {loading && (
                            <div className="text-center">
                                <div className="w-16 h-16 md:w-20 md:h-20 border-4 border-nexus-pink/20 border-t-nexus-pink rounded-full animate-spin mx-auto mb-4"></div>
                                <p className="text-nexus-pink font-mono text-xs animate-pulse tracking-widest px-4 text-center">SINTETIZANDO PÍXELES...</p>
                            </div>
                        )}

                        {imageUrl && !loading && (
                            <div className="w-full h-full relative group p-2 md:p-4">
                                <img src={imageUrl} alt="AI Generated Art" className="w-full h-full object-contain rounded-xl shadow-2xl" />
                                <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition duration-300 flex items-center justify-center rounded-xl m-2 md:m-4">
                                    <a href={imageUrl} target="_blank" download className="px-6 py-3 bg-white text-black font-bold rounded-full hover:scale-105 transition shadow-[0_0_20px_rgba(255,255,255,0.5)] flex items-center gap-2 text-sm md:text-base">
                                        <i className="ph-bold ph-download-simple"></i> Descargar Original
                                    </a>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
